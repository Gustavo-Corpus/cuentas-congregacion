<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentas Congregación Araucarias — Iniciar sesión</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230f1a35'/><text x='16' y='22' font-size='18' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' fill='%2328d6a8'>A</text></svg>" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="logo">A</div>
        <div>
          <h1>Cuentas Araucarias</h1>
          <div class="small muted">Xalapa, Veracruz · MXN</div>
        </div>
      </div>
      <p class="muted small" style="margin:10px 0 18px">
        Sistema de contabilidad de la congregación. Acceso restringido al siervo de cuentas.
      </p>

      <form id="loginForm" autocomplete="on">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="guscorpus40@gmail.com" required />

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />

        <div class="error-msg" id="msg"></div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn" style="margin-top:18px">
          Iniciar sesión
        </button>
        <button type="button" class="btn btn-block" id="resetBtn" style="margin-top:10px">
          ¿Olvidaste tu contraseña?
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { login, observeAuth, resetPassword, authErrorMessage } from "./js/auth.js";

    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const pass = document.getElementById("password");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    // Si ya hay sesión, ir al dashboard.
    observeAuth((user) => { if (user) window.location.replace("app.html"); });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      msg.className = "error-msg";
      btn.disabled = true;
      btn.textContent = "Entrando…";
      try {
        await login(email.value.trim(), pass.value);
        window.location.replace("app.html");
      } catch (err) {
        msg.textContent = authErrorMessage(err.code);
        btn.disabled = false;
        btn.textContent = "Iniciar sesión";
      }
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      msg.className = "error-msg";
      if (!email.value.trim()) { msg.textContent = "Escribe tu correo para enviarte el enlace."; return; }
      try {
        await resetPassword(email.value.trim());
        msg.className = "ok-msg";
        msg.textContent = "Te enviamos un correo para restablecer la contraseña.";
      } catch (err) {
        msg.textContent = authErrorMessage(err.code);
      }
    });
  </script>
</body>
</html>
